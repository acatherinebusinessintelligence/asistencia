<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Asistencia</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:30px;
    border-radius:10px;
    width:350px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    background:#2563eb;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1e4ed8;
}

.small{
    font-size:12px;
    color:#666;
    margin-top:8px;
}
</style>
</head>

<body>

<div class="card">

<h2>Registro de Asistencia</h2>

<form id="attendanceForm">

<input type="text" name="full_name" placeholder="Nombre completo" required>

<input type="text" name="student_id" placeholder="Código estudiante" required>

<input type="email" name="email" placeholder="Correo institucional" required>

<input type="text" name="course" id="course" readonly>

<input type="hidden" name="session_token" id="session_token">

<input type="hidden" name="issued_at" id="issued_at">

<button type="submit">Registrar asistencia</button>

<div class="small">
Este registro solo es válido durante la sesión activa de clase.
</div>

</form>

<div id="respuesta"></div>

</div>

<script>

// leer parámetros del QR
const params = new URLSearchParams(window.location.search)

document.getElementById("course").value = params.get("course") || ""
document.getElementById("session_token").value = params.get("session") || ""
document.getElementById("issued_at").value = params.get("issued") || ""

const form = document.getElementById("attendanceForm")

form.addEventListener("submit", async function(e){

e.preventDefault()

const data = new FormData(form)

const body = Object.fromEntries(data.entries())

const response = await fetch("https://analizamostunegocio.app.n8n.cloud/webhook-test/asistencia-clase-10min",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(body)
})

const result = await response.text()

document.getElementById("respuesta").innerHTML = "<p>"+result+"</p>"

})

</script>

</body>
</html>
